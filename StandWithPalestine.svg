<svg width="800" height="130" viewBox="0 0 800 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g clip-path="url(#clip0)">
        <!-- Máscara para bordes redondeados -->
        <mask id="mask0" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="800" height="130">
            <rect x="0" y="0" width="800" height="130" rx="15" ry="15" fill="white"/>
        </mask>
        <g mask="url(#mask0)">
            <!-- Fondo gradiente -->
            <rect width="800" height="130" fill="url(#gradBackground)"/>

            <!-- Texto NetBillX -->
            <text x="30" y="50" font-family="Montserrat, Arial, sans-serif" font-size="40" font-weight="bold" fill="white">
                NetBillX
            </text>

            <!-- Mensaje principal -->
            <text x="30" y="90" font-family="Montserrat, Arial, sans-serif" font-size="22" fill="white">
                Profesionaliza tu operación. Optimiza tu gestión.
            </text>
            <text x="30" y="115" font-family="Montserrat, Arial, sans-serif" font-size="22" fill="white">
                Impulsa tu ISP.
            </text>

            <!-- Características -->
            <text x="400" y="60" font-family="Montserrat, Arial, sans-serif" font-size="18" fill="#4CAF50">
                Multi Router MikroTik, Hotspot & PPPoE
            </text>
            <text x="400" y="85" font-family="Montserrat, Arial, sans-serif" font-size="18" fill="#FFEB3B">
                Renovaciones automáticas, Notif. WhatsApp/Telegram
            </text>
            <text x="400" y="110" font-family="Montserrat, Arial, sans-serif" font-size="18" fill="#4CAF50">
                Pagos en línea
            </text>

            <!-- Botón WhatsApp -->
            <rect x="650" y="50" width="120" height="40" rx="10" ry="10" fill="#25D366"/>
            <text x="660" y="78" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
                0422-4512433
            </text>
        </g>
    </g>

    <!-- Definición gradiente -->
    <defs>
        <linearGradient id="gradBackground" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0D47A1"/>
            <stop offset="1" stop-color="#1976D2"/>
        </linearGradient>
        <clipPath id="clip0">
            <rect width="800" height="130" rx="15" ry="15" fill="white"/>
        </clipPath>
    </defs>
</svg>
